<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bundle Broadcaster - Login</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0f0f12; color: #e4e4e7; }
    .card { background: #18181b; border-radius: 8px; padding: 2rem; width: 100%; max-width: 320px; border: 1px solid #27272a; }
    h1 { margin: 0 0 1.5rem; font-size: 1.25rem; color: #a1a1aa; }
    input { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #3f3f46; border-radius: 6px; background: #27272a; color: #e4e4e7; font-size: 1rem; }
    input:focus { outline: none; border-color: #3b82f6; }
    button { width: 100%; padding: 0.75rem; background: #3b82f6; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #2563eb; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #ef4444; font-size: 0.875rem; margin-bottom: 1rem; }
    .lockout { color: #f59e0b; font-size: 0.875rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Metrics Dashboard Login</h1>
    {{if .Error}}
    <p class="error">{{.Error}}</p>
    {{end}}
    {{if .LockedUntil}}
    <p class="lockout">Too many failed attempts. Try again after {{.LockedUntil}}.</p>
    {{end}}
    <form method="POST" action="">
      <input type="password" name="password" placeholder="Password" autocomplete="current-password" {{if .LockedUntil}}disabled{{end}} required>
      <button type="submit" {{if .LockedUntil}}disabled{{end}}>Login</button>
    </form>
  </div>
</body>
</html>
